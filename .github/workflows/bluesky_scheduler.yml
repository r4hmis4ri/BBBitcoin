name: Bluesky Scheduler Bot

# This workflow runs automatically every 15 minutes to check your CSV for due posts.

on:
  schedule:
    # Runs every 15 minutes (at :00, :15, :30, :45)
    - cron: '*/15 * * * *'
  # Also allows you to run it manually from the "Actions" tab
  workflow_dispatch:

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    
    # We need permission to commit back the "posted_log.json"
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: |
          cd bluesky_automation
          npm install

      - name: 🚀 Run Bluesky Scheduler
        env:
          # These must be added in GitHub Repo Settings > Secrets > Actions
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          cd bluesky_automation
          node scheduler.js bluesky_carousel_schedule.csv

      - name: 💾 Save Posted Log (Commit Back)
        run: |
          git config --global user.name "BBBitcoin Bot"
          git config --global user.email "bot@bit-by-bitcoin.com"
          
          # Only add if the log file exists and has changed
          if [ -f "bluesky_automation/posted_log.json" ]; then
            git add bluesky_automation/posted_log.json
            git commit -m "🤖 Bot: Updated posted_log.json [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No log file to save."
          fi
